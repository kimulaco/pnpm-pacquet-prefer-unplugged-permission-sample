version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout

      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm@11.2.1

      - restore_cache:
          keys:
            - pnpm-{{ checksum "pnpm-lock.yaml" }}

      - run:
          name: Install dependencies
          command: pnpm i

      - save_cache:
          key: pnpm-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - node_modules
            - packages/pkg-a/node_modules
            - packages/pkg-b/node_modules

      - run:
          name: Debug esbuild binary permissions
          command: |
            echo "=== All esbuild entries in .pnpm ==="
            ls -la node_modules/.pnpm/ | grep esbuild || true

            echo ""
            echo "=== @esbuild/linux-x64 directory permissions ==="
            DIR="node_modules/.pnpm/@esbuild+linux-x64@0.25.12"
            if [ -d "$DIR" ]; then
              ls -la "$DIR"
              ls -la "$DIR/node_modules/@esbuild/linux-x64/" 2>/dev/null || echo "cannot list: permission denied"
              ls -la "$DIR/node_modules/@esbuild/linux-x64/bin/" 2>/dev/null || echo "cannot list bin/: permission denied"
              stat "$DIR/node_modules/@esbuild/linux-x64/bin/esbuild" 2>/dev/null || echo "cannot stat binary"
            else
              echo "$DIR does not exist"
            fi

            echo ""
            echo "=== esbuild JS wrapper ==="
            stat node_modules/.pnpm/esbuild@0.25.12/node_modules/esbuild/bin/esbuild 2>/dev/null || true

      - run:
          name: Test
          command: pnpm test

workflows:
  test:
    jobs:
      - test
